<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f8ff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }

  form {
    background-color: #ffffff;
    padding: 30px 40px;
    border-radius: 10px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    width: 350px;
  }

  h2 {
    text-align: center;
    color: #333333;
    margin-bottom: 20px;
  }

  label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
    color: #333333;
  }

  input, textarea, button, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    font-size: 14px;
  }

  textarea {
    resize: vertical;
    min-height: 60px;
  }

  button {
    background-color: #4da6ff;
    color: white;
    font-weight: bold;
    margin-top: 20px;
    border: none;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  button:hover {
    background-color: #3399ff;
  }
  .tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;

}

.tabs button {
  padding: 8px 16px;
  cursor: pointer;
}
.form-wrapper {
  display: flex;
  flex-direction: column; /* 👈 forces vertical stacking */
  align-items: center;
}
  
  
#loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0.8);
  /* We use flex to center, but JS will toggle 'none' vs 'flex' */
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid #f3f3f3;
  border-top: 5px solid #3498db;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}



</style>

    <script>
window.addEventListener('DOMContentLoaded', () => {


  const forms = document.querySelectorAll('form');
  const loader = document.getElementById('loading-overlay');

  forms.forEach((form) => {

    let clickedButton = null;

    // Remember which submit button was clicked
    form.querySelectorAll('button[type="submit"]').forEach(btn => {
      btn.addEventListener('click', () => {
        clickedButton = btn;
      });
    });

    form.addEventListener('submit', async (e) => {

      e.preventDefault();

      loader.style.display = 'flex';

      try {

        const formData = new FormData(form);

        // Include the clicked submit button
        if (clickedButton) {
          formData.append(clickedButton.name, clickedButton.value);
        }

        const response = await fetch(SCRIPT_URL, {
          method: form.method || 'POST',
          body: formData
        });

        const result = await response.text();

        alert(result);
        forms.forEach(f => f.reset());

      } catch (err) {

        console.error(err);
        alert('Submission failed.');

      } finally {

        loader.style.display = 'none';
        clickedButton = null;

      }
    });
  });

  window.addEventListener('pageshow', (event) => {
    if (event.persisted) {
      loader.style.display = 'none';
    }
  });

});
</script>

    <script>
document.getElementById("pastPhone")

        function loadPastJobs() {

  const lastName =
    document.getElementById("pastLastName").value;

  const phone =
    document.getElementById("pastPhone").value;

  if (!lastName && !phone) return;

  const select =
    document.getElementById("pastJobSelect");

  select.innerHTML =
    "<option>Loading...</option>";

  select.disabled = true;

  const url =
    `${SCRIPT_URL}?action=getJobs&lastName=${encodeURIComponent(lastName)}&phone=${encodeURIComponent(phone)}`;

  fetch(url)
    .then(res => res.json())
    .then(data => {

      select.innerHTML =
        '<option value="">Select Job</option>';

      if (data.length === 0) {

        select.innerHTML =
          '<option>No jobs found</option>';

        return;
      }

      let currentStatus = "";

      data.forEach(job => {

        if (job.status !== currentStatus) {

          currentStatus = job.status;

          const group =
            document.createElement("optgroup");

          group.label = currentStatus;

          select.appendChild(group);
        }

        const option =
          document.createElement("option");

        option.value = job.id;

        option.textContent = job.label;

        select.lastElementChild.appendChild(option);

      });

      select.disabled = false;
    })
    .catch(err => {
      console.error(err);
      alert("Error loading jobs");
    });
}

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOxtMpZToht8S32KcN1eJ24NXYK-qKhYxZanWioi2jS5mwdtN0xjkGJNX9iv8uj1aasQ/exec";

  function formatTime(t) {
  const [hour, minute] = t.split(":").map(Number);

  let suffix = "AM";
  let displayHour = hour;

  if (hour >= 12) {
    suffix = "PM";
    if (hour > 12) displayHour = hour - 12;
  }

  if (hour === 0) displayHour = 12;

  return `${displayHour}:${minute.toString().padStart(2, "0")} ${suffix}`;
}
  
function showForm(id) {
  document.querySelectorAll(".tab-form")
    .forEach(f => f.style.display = "none");

  document.getElementById(id).style.display = "block";
}
  

// Triggers when the value changes and focus leaves

});
    

 document.getElementById("cancelLastName").addEventListener("change", loadAppointments);

function loadAppointments() {
  const lastName = document.getElementById("cancelLastName").value;
  const phone = document.getElementById("cancelPhone").value;

  if (!lastName && !phone) return;

  const url = `${SCRIPT_URL}?action=getAppointments&lastName=${lastName}&phone=${phone}`;

  const select = document.getElementById("appointmentSelect");
  select.innerHTML = '<option>Loading...</option>';
  select.disabled = true;
  
fetch(url)
    .then(res => res.json())
    .then(data => {
      select.innerHTML = '<option value="">Select appointment</option>';

      if (data.length === 0) {
        select.innerHTML = '<option>No upcoming appointments</option>';
        return;
      }

      data.forEach(appt => {
        const opt = document.createElement("option");

        // value should be unique ID (IMPORTANT)
        opt.value = appt.id;
        opt.textContent = appt.label;
        select.appendChild(opt);
      });

      select.disabled = false;
    })
    .catch(err => {
      console.error(err);
      alert("Error loading appointments");
    });
  
}
