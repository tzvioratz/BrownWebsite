  animation: spin 1s linear infinite;
}

@keyframes spin {

  100% { transform: rotate(360deg); }

    <script>
window.addEventListener('DOMContentLoaded', () => {


  const forms = document.querySelectorAll('form');
  const loader = document.getElementById('loading-overlay');

  forms.forEach((form) => {

    let clickedButton = null;

    // Remember which submit button was clicked
    form.querySelectorAll('button[type="submit"]').forEach(btn => {
      btn.addEventListener('click', () => {
        clickedButton = btn;
      });
    });

    form.addEventListener('submit', async (e) => {

      e.preventDefault();

      loader.style.display = 'flex';

      try {

        const formData = new FormData(form);

        // Include the clicked submit button
        if (clickedButton) {
          formData.append(clickedButton.name, clickedButton.value);
        }
        
        formData.append("password",sessionStorage.getItem("auth"));

        const response = await fetch(SCRIPT_URL, {
          method: form.method || 'POST',
          body: formData
        });

        const result = await response.text();

        alert(result);
        forms.forEach(f => f.reset());

      } catch (err) {

        console.error(err);
        alert('Submission failed.');

      } finally {

        loader.style.display = 'none';
        clickedButton = null;

      }
    });
  });

  window.addEventListener('pageshow', (event) => {
    if (event.persisted) {
      loader.style.display = 'none';
    }
  });

});
</script>

        function loadPastJobs() {



  const phone =
    document.getElementById("pastPhone").value;

  if (!phone) return;

  const select =
    document.getElementById("pastJobSelect");

  select.innerHTML =
    "<option>Loading...</option>";

  select.disabled = true;

  const url =
    `${SCRIPT_URL}?action=getJobs&phone=${encodeURIComponent(phone)}&password=${sessionStorage.getItem("auth")}`;

  fetch(url)
    .then(res => res.json())
    .then(data => {

      select.innerHTML =
        '<option value="">Select Job</option>';

      if (data.length === 0) {

        select.innerHTML =
          '<option>No jobs found</option>';

        return;
      }

      let currentStatus = "";

      data.forEach(job => {

        if (job.status !== currentStatus) {

          currentStatus = job.status;

          const group =
            document.createElement("optgroup");

          group.label = currentStatus;

          select.appendChild(group);
        }

        const option =
          document.createElement("option");

        option.value = job.id;

        option.textContent = job.label;

        select.lastElementChild.appendChild(option);

      });

      select.disabled = false;
    })
    .catch(err => {
      console.error(err);
      alert("Error loading jobs");
    });
}

  function formatTime(t) {
  const [hour, minute] = t.split(":").map(Number);

  let suffix = "AM";
  let displayHour = hour;

  if (hour >= 12) {
    suffix = "PM";
    if (hour > 12) displayHour = hour - 12;
  }

  if (hour === 0) displayHour = 12;

  return `${displayHour}:${minute.toString().padStart(2, "0")} ${suffix}`;
}

fetch(url)
